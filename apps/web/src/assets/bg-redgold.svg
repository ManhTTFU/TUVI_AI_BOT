<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    
    <radialGradient id="paper" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#fbf3e2"></stop>
      <stop offset="55%" stop-color="#f6e9cf"></stop>
      <stop offset="100%" stop-color="#ead8b4"></stop>
    </radialGradient>

    
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c873" stop-opacity="1"></stop>
      <stop offset="35%" stop-color="#d97a4a" stop-opacity="0.85"></stop>
      <stop offset="70%" stop-color="#a73c2c" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#a73c2c" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="sunDisc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8d98a"></stop>
      <stop offset="50%" stop-color="#e09545"></stop>
      <stop offset="100%" stop-color="#a73c2c"></stop>
    </radialGradient>

    
    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af6a" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#b58a4a" stop-opacity="0.25"></stop>
    </linearGradient>

    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a73c2c" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#7a1d1d" stop-opacity="0.35"></stop>
    </linearGradient>

    <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a1414" stop-opacity="0.85"></stop>
      <stop offset="100%" stop-color="#3a0c0c" stop-opacity="0.6"></stop>
    </linearGradient>

    <linearGradient id="branchInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a1a0e"></stop>
      <stop offset="100%" stop-color="#1f0a04"></stop>
