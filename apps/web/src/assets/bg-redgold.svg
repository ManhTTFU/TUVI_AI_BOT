          <line x1="0" y1="0" x2="3.8" y2="-1.2"></line>
          <line x1="0" y1="0" x2="2.4" y2="3.2"></line>
          <line x1="0" y1="0" x2="-2.4" y2="3.2"></line>
          <line x1="0" y1="0" x2="-3.8" y2="-1.2"></line>
