        <circle r="9" cx="9.5" cy="-3.1" fill="url(#plum)"></circle>
        <circle r="9" cx="5.9" cy="8.1" fill="url(#plum)"></circle>
        <circle r="9" cx="-5.9" cy="8.1" fill="url(#plum)"></circle>
        <circle r="9" cx="-9.5" cy="-3.1" fill="url(#plum)"></circle>
        <circle r="3" fill="url(#plumDark)"></circle>
        <g stroke="#5a1414" stroke-width="0.6" fill="none" opacity="0.7">
